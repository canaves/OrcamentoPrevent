 <!DOCTYPE html>
  <html lang="pt-br">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>PDF - Orçamento Prevent Master</title>
      <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
      <style>
          body {
              margin: 0;
              padding: 0;
              font-family: Arial, sans-serif;
              background: #f5f5f5;
          }

          #pdf-content {
              width: 210mm;
              margin: 20px auto;
              padding: 0;
              background: white;
              box-shadow: 0 0 20px rgba(0,0,0,0.1);
              min-height: 297mm;
              position: relative;
          }

          .no-print {
              position: fixed;
              top: 20px;
              right: 20px;
              z-index: 1000;
              display: flex;
              gap: 10px;
              background: white;
              padding: 15px;
              border-radius: 10px;
              box-shadow: 0 4px 6px rgba(0,0,0,0.1);
          }

          .no-print button {
              padding: 10px 20px;
              border: none;
              border-radius: 6px;
              font-weight: 600;
              cursor: pointer;
              transition: all 0.2s;
          }

          .btn-primary {
              background: #2d4a6b;
              color: white;
          }

          .btn-primary:hover {
              background: #1e3450;
          }

          .btn-secondary {
              background: #e2e8f0;
              color: #1a1f26;
          }

          .btn-secondary:hover {
              background: #cbd5e1;
          }

          .print-only {
              display: none;
          }

          @media print {
              body {
                  margin: 0;
                  padding: 0;
                  background: white;
              }

              .no-print {
                  display: none;
              }

              #pdf-content {
                  margin: 0;
                  box-shadow: none;
                  width: 100%;
                  height: 100vh;
              }

              .print-only {
                  display: block;
              }
          }

          /* Loading spinner */
          .loading {
              position: absolute;
              top: 50%;
              left: 50%;
              transform: translate(-50%, -50%);
              text-align: center;
          }

          .spinner {
              border: 3px solid #f3f3f3;
              border-top: 3px solid #2d4a6b;
              border-radius: 50%;
              width: 40px;
              height: 40px;
              animation: spin 1s linear infinite;
              margin: 0 auto 10px;
          }

          @keyframes spin {
              0% { transform: rotate(0deg); }
              100% { transform: rotate(360deg); }
          }
      </style>
  </head>
  <body>
      <div id="pdf-content">
          <div class="loading">
              <div class="spinner"></div>
              <p>Carregando documento...</p>
          </div>
      </div>

      <div class="no-print">
          <button onclick="window.print()" class="btn-primary">📄 Imprimir PDF</button>
          <button onclick="downloadPDF()" class="btn-secondary">📥 Baixar PDF</button>
          <button onclick="history.back()" class="btn-secondary">← Voltar</button>
      </div>

      <script>
          function loadFromParams() {
              // Carrega diretamente do Blob (não precisa de parâmetro)
              // Esta página deve ser aberta pelo index.html
              document.getElementById('pdf-content').innerHTML = `
                  <div style="text-align: center; padding: 50px; color: #666;">
                      <h2>Erro ao carregar o documento</h2>
                      <p>Por favor, volte e gere o orçamento novamente.</p>
                  </div>
              `;
          }

          function downloadPDF() {
              const pdfContent = document.getElementById('pdf-content');

              const opt = {
                  margin: 0,
                  filename: `Orcamento_PreventMaster_${getClientName()}.pdf`,
                  image: { type: 'jpeg', quality: 0.98 },
                  html2canvas: {
                      scale: 2,
                      useCORS: true,
                      letterRendering: true,
                      logging: false,
                      removeContainer: false
                  },
                  jsPDF: {
                      unit: 'mm',
                      format: 'a4',
                      orientation: 'portrait',
                      compress: true
                  },
                  pagebreak: { mode: ['avoid-all', 'css'] }
              };

              html2pdf().set(opt).from(pdfContent).save();
          }

          function getClientName() {
              // Tenta extrair o nome do cliente do HTML
              const temp = document.createElement('div');
              temp.innerHTML = document.getElementById('pdf-content').innerHTML;
              const nameElement = temp.querySelector('h2');
              if (nameElement && nameElement.textContent !== 'Prevent Master') {
                  return nameElement.textContent.replace('Prevent Master', '').trim();
              }
              return 'Cliente';
          }

          // Carrega o conteúdo quando a página carrega
          window.addEventListener('load', loadFromParams);
      </script>
  </body>
  </html>
